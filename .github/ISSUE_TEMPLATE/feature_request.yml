name: Feature request
description: Propose a new capability or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Connector / data source
        - Generation task
        - Quality gate
        - Hygiene gate
        - Exporter / output format
        - Adaptive recovery / diagnostics
        - CLI / YAML config
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case, not just the feature.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
