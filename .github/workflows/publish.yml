name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine check-wheel-contents
      - name: Rewrite relative README image paths for PyPI rendering
        run: |
          sed -i 's#src="docs/assets/#src="https://raw.githubusercontent.com/Lexsi-Labs/CuratorKIT/main/docs/assets/#g; s#srcset="docs/assets/#srcset="https://raw.githubusercontent.com/Lexsi-Labs/CuratorKIT/main/docs/assets/#g' README.md
      - run: python -m build
      - run: twine check dist/*
      - run: check-wheel-contents dist/*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI Trusted Publishing — no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
