name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example 1.0.1"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine check-wheel-contents

      - name: Validate release version
        run: |
          TAG_VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION="$(python -c 'import pathlib, re; print(re.search(r"^__version__ = \"([^\"]+)\"$", pathlib.Path("curatorkit/__init__.py").read_text(), re.MULTILINE).group(1))')"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Release tag ($TAG_VERSION) does not match package version ($PACKAGE_VERSION)"
            exit 1
          fi
          if [[ "$TAG_VERSION" == *".dev"* ]]; then
            echo "Refusing to publish dev release $TAG_VERSION"
            exit 1
          fi

      - name: Clean build artifacts
        run: rm -rf dist build ./*.egg-info

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Check wheel contents
        run: check-wheel-contents dist/*.whl

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Send release notes to Slack
        uses: slackapi/slack-github-action@v1.24.0
        continue-on-error: true
        with:
          channel-id: "lexsi-labs-curator-kit-release"
          payload: |
            {
              "text": "CuratorKIT release",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Version:* ${{ env.RELEASE_TAG }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Release:* https://github.com/${{ github.repository }}/releases/tag/${{ env.RELEASE_TAG }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*PyPI:* https://pypi.org/project/curatorkit/${{ env.RELEASE_TAG }}/"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
