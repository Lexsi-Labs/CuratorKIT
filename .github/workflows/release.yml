name: Create release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.1. Leave blank to bump patch."
        required: false
        type: string

permissions:
  contents: write

jobs:
  github:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure tags are available
        run: git fetch --prune --tags

      - name: Create GitHub release
        id: release
        run: python .github/scripts/release.py --version "${{ inputs.version }}"
        env:
          GH_TOKEN: ${{ github.token }}

  pypi:
    needs: github
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ needs.github.outputs.version }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.github.outputs.version }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine check-wheel-contents

      - name: Validate release version
        run: |
          PACKAGE_VERSION="$(python -c 'import pathlib, re; print(re.search(r"^__version__ = \"([^\"]+)\"$", pathlib.Path("curatorkit/__init__.py").read_text(), re.MULTILINE).group(1))')"
          if [ "$RELEASE_TAG" != "$PACKAGE_VERSION" ]; then
            echo "Release tag ($RELEASE_TAG) does not match package version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Clean build artifacts
        run: rm -rf dist build ./*.egg-info

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Check wheel contents
        run: check-wheel-contents dist/*.whl

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Send release notes to Slack
        uses: slackapi/slack-github-action@v3.0.3
        continue-on-error: true
        with:
          channel-id: "lexsi-labs-curator-kit-release"
          payload: |
            {
              "text": "CuratorKIT release",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Version:* ${{ env.RELEASE_TAG }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Release:* https://github.com/${{ github.repository }}/releases/tag/${{ env.RELEASE_TAG }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*PyPI:* https://pypi.org/project/curatorkit/${{ env.RELEASE_TAG }}/"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
