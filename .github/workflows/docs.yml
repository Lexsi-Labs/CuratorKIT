name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "curatorkit/**"   # the API reference is generated from docstrings
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # mike reads and updates the gh-pages branch
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[docs]"   # the API reference imports the package
      - name: Configure committer identity for gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Deploy versioned docs with mike
        run: |
          VERSION=$(python -c "import curatorkit; print('.'.join(curatorkit.__version__.split('.')[:2]))")
          mike deploy --push --update-aliases "$VERSION" latest
          mike set-default --push latest
